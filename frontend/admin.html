<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senex Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0d0d; color:#f4f0e8; font-family:'Source Serif 4',Georgia,serif; min-height:100vh; }
  .header { border-bottom:1px solid #2a2520; padding:1.5rem 2rem; display:flex; justify-content:space-between; align-items:center; }
  .header h1 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; text-transform:uppercase; letter-spacing:0.05em; }
  .header-meta { font-family:monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:#6b6355; }
  .container { max-width:1000px; margin:0 auto; padding:2rem; }
  .section-label { font-family:monospace; font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase; color:#6b6355; margin-bottom:1.5rem; padding-bottom:0.5rem; border-bottom:1px solid #2a2520; }
  .brief-card { background:#141414; border:1px solid #2a2520; border-left:3px solid #8b1a1a; margin-bottom:1.5rem; padding:1.5rem; }
  .brief-card.published { border-left-color:#1a5c3a; }
  .brief-kicker { font-family:monospace; font-size:0.55rem; letter-spacing:0.25em; text-transform:uppercase; color:#8b1a1a; margin-bottom:0.5rem; }
  .brief-headline { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; line-height:1.2; margin-bottom:0.5rem; }
  .brief-deck { font-style:italic; color:#6b6355; font-size:0.9rem; line-height:1.6; margin-bottom:1rem; }
  .editor-notes { background:#1a1a1a; border:1px solid #2a2520; border-left:3px solid #c8b89a; padding:1rem; margin-bottom:1rem; font-size:0.85rem; line-height:1.6; color:#c8b89a; }
  .editor-notes strong { font-family:monospace; font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; display:block; margin-bottom:0.5rem; color:#6b6355; }
  .sections { margin-bottom:1rem; }
  .section-item { margin-bottom:1rem; }
  .section-heading-label { font-family:monospace; font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; color:#6b6355; margin-bottom:0.4rem; }
  .section-content-edit { width:100%; background:#0d0d0d; border:1px solid #2a2520; color:#f4f0e8; padding:0.8rem; font-family:'Source Serif 4',Georgia,serif; font-size:0.9rem; line-height:1.7; resize:vertical; min-height:80px; }
  .section-content-edit:focus { outline:none; border-color:#c8b89a; }
  .market-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:#2a2520; margin-bottom:1rem; }
  .market-cell { background:#141414; padding:0.7rem; font-family:monospace; font-size:0.75rem; }
  .market-label { font-size:0.55rem; color:#6b6355; margin-bottom:0.3rem; text-transform:uppercase; }
  .actions { display:flex; gap:1rem; margin-top:1rem; padding-top:1rem; border-top:1px solid #2a2520; }
  .btn-approve { background:#1a5c3a; color:#f4f0e8; border:none; padding:0.7rem 1.5rem; font-family:monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; }
  .btn-approve:hover { background:#2a7a4a; }
  .btn-spike { background:none; border:1px solid #8b1a1a; color:#8b1a1a; padding:0.7rem 1.5rem; font-family:monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; }
  .btn-spike:hover { background:#8b1a1a; color:#f4f0e8; }
  .btn-delete { background:none; border:1px solid #444; color:#666; padding:0.7rem 1.5rem; font-family:monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; }
  .btn-delete:hover { background:#333; color:#f4f0e8; }
  .status-badge { font-family:monospace; font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; padding:3px 8px; border:1px solid currentColor; display:inline-block; margin-bottom:1rem; }
  .status-pending { color:#c8b89a; }
  .status-published { color:#1a5c3a; }
  .risk-badge { font-family:monospace; font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; padding:3px 8px; border:1px solid currentColor; display:inline-block; margin-left:0.5rem; }
  .risk-HIGH { color:#8b1a1a; }
  .risk-MEDIUM { color:#8b6914; }
  .risk-LOW { color:#1a5c3a; }
  .loading { text-align:center; font-family:monospace; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:#6b6355; padding:4rem; }
  .empty { text-align:center; font-family:monospace; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:#2a2520; padding:2rem; }
  .toast { position:fixed; bottom:2rem; right:2rem; background:#1a5c3a; color:#f4f0e8; padding:0.8rem 1.5rem; font-family:monospace; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; display:none; }
  #loginScreen { position:fixed; inset:0; background:#0d0d0d; display:flex; align-items:center; justify-content:center; z-index:100; }
  .login-box { background:#141414; border:1px solid #2a2520; padding:2rem; width:300px; }
  .login-box h2 { font-family:'Playfair Display',serif; font-size:1.2rem; margin-bottom:1.5rem; text-align:center; }
  .login-input { width:100%; background:#0d0d0d; border:1px solid #2a2520; border-bottom:2px solid #f4f0e8; color:#f4f0e8; padding:0.7rem; font-family:monospace; font-size:0.85rem; margin-bottom:1rem; outline:none; }
  .login-btn { width:100%; background:#f4f0e8; color:#0d0d0d; border:none; padding:0.8rem; font-family:monospace; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; }
  .login-error { color:#8b1a1a; font-family:monospace; font-size:0.65rem; text-align:center; margin-top:0.5rem; display:none; }
  .tabs { display:flex; gap:2rem; margin-bottom:2rem; border-bottom:1px solid #2a2520; padding-bottom:1rem; }
  .tab { font-family:monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:#6b6355; cursor:pointer; padding-bottom:0.5rem; border-bottom:2px solid transparent; }
  .tab.active { color:#f4f0e8; border-bottom-color:#f4f0e8; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>Senex Admin</h2>
    <input type="password" class="login-input" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Enter</button>
    <div class="login-error" id="loginError">Incorrect password</div>
  </div>
</div>

<div id="adminApp" style="display:none">
  <div class="header">
    <h1>Senex Admin</h1>
    <div class="header-meta" id="headerMeta"></div>
  </div>

  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="showTab('pending')">Pending Review</div>
      <div class="tab" onclick="showTab('published')">Published</div>
    </div>

    <div id="pendingTab">
      <div class="section-label">▸ Awaiting Your Review</div>
      <div id="pendingList"><div class="loading">Loading...</div></div>
    </div>

    <div id="publishedTab" style="display:none">
      <div class="section-label">▸ Published Briefs</div>
      <div id="publishedList"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://hnwyikgcycofoypgsjsg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhud3lpa2djeWNvZm95cGdzanNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1ODgyNDYsImV4cCI6MjA5MzE2NDI0Nn0.ToI-ps_Ka_1Bg748wB4scHlzJOHkXMlELfs5NnhSy-g";
const ADMIN_PASSWORD = "JerseyTucker@0825";

let allBriefs = [];

function login() {
  const pw = document.getElementById("passwordInput").value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminApp").style.display = "block";
    loadBriefs();
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("pendingTab").style.display = tab === "pending" ? "block" : "none";
  document.getElementById("publishedTab").style.display = tab === "published" ? "block" : "none";
}

async function loadBriefs() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/briefs?select=*&order=published_at.desc&limit=50`, {
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  allBriefs = await res.json();

  const pending = allBriefs.filter(b => b.status === "pending");
  const published = allBriefs.filter(b => b.status === "published");

  document.getElementById("headerMeta").textContent = `${pending.length} pending · ${published.length} published`;

  renderBriefs(pending, "pendingList", true);
  renderBriefs(published, "publishedList", false);
}

function renderBriefs(briefs, containerId, isPending) {
  const el = document.getElementById(containerId);
  if (!briefs.length) {
    el.innerHTML = `<div class="empty">${isPending ? "No briefs pending review" : "No published briefs"}</div>`;
    return;
  }
  el.innerHTML = briefs.map(b => renderCard(b, isPending)).join("");
}

function renderCard(b, isPending) {
  const sections = (b.sections || []).map((s, i) => `
    <div class="section-item">
      <div class="section-heading-label">${s.heading}</div>
      <textarea class="section-content-edit" id="section_${b.id}_${i}">${s.content}</textarea>
    </div>`).join("");

  const marketHtml = (b.market_data || []).map(d => `
    <div class="market-cell">
      <div class="market-label">${d.label}</div>
      <div>${d.value}</div>
      <div style="color:${d.direction==='up'?'#1a5c3a':d.direction==='down'?'#8b1a1a':'#6b6355'};font-size:0.7rem;margin-top:2px">${d.change}</div>
    </div>`).join("");

  const actions = isPending ? `
    <button class="btn-approve" onclick="approveBrief(${b.id})">✓ Approve & Publish</button>
    <button class="btn-spike" onclick="spikeBrief(${b.id})">✕ Spike</button>` : `
    <button class="btn-delete" onclick="deleteBrief(${b.id})">Delete</button>`;

  return `
    <div class="brief-card ${isPending ? '' : 'published'}" id="card_${b.id}">
      <span class="status-badge ${isPending ? 'status-pending' : 'status-published'}">${isPending ? 'Pending Review' : 'Published'}</span>
      <span class="risk-badge risk-${b.risk_level}">${b.risk_level} RISK</span>
      <div class="brief-kicker">${b.kicker || ""}</div>
      <div class="brief-headline">${b.headline || ""}</div>
      <div class="brief-deck">${b.deck || ""}</div>
      ${b.editor_note ? `<div class="editor-notes"><strong>Editor Notes</strong>${b.editor_note}</div>` : ""}
      <div class="market-strip">${marketHtml}</div>
      <div class="sections">${sections}</div>
      <div class="actions">${actions}</div>
    </div>`;
}

async function approveBrief(id) {
  const brief = allBriefs.find(b => b.id === id);
  const updatedSections = (brief.sections || []).map((s, i) => ({
    ...s,
    content: document.getElementById(`section_${id}_${i}`)?.value || s.content
  }));

  const res = await fetch(`${SUPABASE_URL}/rest/v1/briefs?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify({ status: "published", sections: updatedSections })
  });

  if (res.ok) {
    document.getElementById(`card_${id}`).remove();
    showToast("Brief published ✓");
    loadBriefs();
  } else {
    showToast("Error publishing brief");
  }
}

async function spikeBrief(id) {
  if (!confirm("Spike this brief? It will be deleted permanently.")) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/briefs?id=eq.${id}`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  if (res.ok) {
    document.getElementById(`card_${id}`).remove();
    showToast("Brief spiked");
    loadBriefs();
  }
}

async function deleteBrief(id) {
  if (!confirm("Delete this published brief?")) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/briefs?id=eq.${id}`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  if (res.ok) {
    document.getElementById(`card_${id}`).remove();
    showToast("Brief deleted");
    loadBriefs();
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}
</script>
</body>
</html>
